name: Update Dependencies

on:
  schedule:
    - cron: "0 0 * * 1"  # every Monday at midnight
  workflow_dispatch:       # manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Update Cargo dependencies
        run: cargo update

      - name: Check if anything changed
        id: check
        run: |
          git diff --exit-code Cargo.lock || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create PR with updates
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update Cargo dependencies"
          title: "chore: update Cargo dependencies"
          body: "Automated weekly dependency update via `cargo update`."
          branch: deps/cargo-update
          delete-branch: true